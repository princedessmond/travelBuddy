name: travel_companion
description: A comprehensive travel planning app with AI-powered features

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # HTTP Requests
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UUID Generation
  uuid: ^4.2.1

  # Date/Time
  intl: ^0.19.0

  # JSON Serialization
  json_annotation: ^4.8.1

  # UI Components
  cupertino_icons: ^1.0.2

  # Maps
  google_maps_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
