name: travel_companion
description: A comprehensive travel planning app with AI-powered features

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  provider: ^6.0.5

  # Environment Variables
  flutter_dotenv: ^5.1.0

  # HTTP Requests
  http: ^1.1.0

  # Local Storage
  shared_preferences: ^2.2.2

  # UUID Generation
  uuid: ^4.2.1

  # Date/Time
  intl: ^0.19.0
  timezone: ^0.9.2

  # JSON Serialization
  json_annotation: ^4.8.1

  # UI Components
  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.9

  # Maps
  google_maps_flutter: ^2.5.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  geolocator: ^11.0.0

  # Image Handling
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  image_cropper: ^5.0.1

  # File System
  path_provider: ^2.1.2

  # Social Features
  share_plus: ^7.2.2
  url_launcher: ^6.2.4
  timeago: ^3.6.1

  # Voice Input
  speech_to_text: ^6.6.0
  permission_handler: ^11.2.0

  # AI Services
  google_generative_ai: ^0.2.2

  # Utilities
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/animations/
